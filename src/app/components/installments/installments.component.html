<div class="inst-wrap" dir="rtl">

  <!-- ════ STICKY HEADER ════ -->
  <app-installments-header [activeCount]="activeCount" [totalRemaining]="totalRemaining" [totalMonthly]="totalMonthly"
    [itemsCount]="items.length" [viewMode]="viewMode" (toggleView)="toggleView()" (openAdd)="openAdd()">
  </app-installments-header>

  <!-- ════ CONTENT BODY ════ -->
  <div class="inst-body">
    @if (items.length === 0) {
      <!-- Empty State -->
      <app-installments-empty-state (openAdd)="openAdd()"></app-installments-empty-state>
    } @else {
      @if (viewMode === 'grid') {
        <!-- Grid View (Cards) -->
        <div class="row g-4">
          @for (item of items; track item.id) {
            @let st = statusOf(item.id);
            <div class="col-12 col-lg-6">
              <app-installment-card
                [item]="item"
                [st]="st"
                [expandedLoans]="expandedLoans"
                (undoPayment)="undoPayment($event)"
                (markAsPaid)="markAsPaid($event.item, $event.loan, $event.milestoneId)"
                (openEdit)="openEdit($event)"
                (confirmDelete)="confirmDelete($event)"
                (toggleTopHistory)="toggleTopHistory($event)"
                (toggleLoanHistory)="toggleLoanHistory($event)"
                (undoMilestonePayment)="undoMilestonePayment($event.item, $event.milestoneId)"
                (markMilestoneAsPaid)="markMilestoneAsPaid($event.item, $event.milestoneId)">
              </app-installment-card>
            </div>
          }
        </div>
      } @else {
        <!-- Table View -->
        <app-installments-table [sortedStatuses]="sortedStatuses" [expandedLoans]="expandedLoans" [sortKey]="sortKey"
          [sortDir]="sortDir" (setSort)="setSort($event)" (toggleTopHistory)="toggleTopHistory($event)"
          (undoPayment)="undoPayment($event.item, $event.loanId, $event.milestoneId)"
          (markAsPaid)="markAsPaid($event.item, $event.loan, $event.milestoneId)" (openEdit)="openEdit($event)"
          (confirmDelete)="confirmDelete($event)" (toggleLoanHistory)="toggleLoanHistory($event)"
          (undoMilestonePayment)="undoMilestonePayment($event.item, $event.milestoneId)"
          (markMilestoneAsPaid)="markMilestoneAsPaid($event.item, $event.milestoneId)">
        </app-installments-table>
      }
    }
  </div>
</div>

<!-- ════ FORM DIALOG ════ -->
<app-installment-form [showForm]="showForm" [form]="form" [editingId]="editingId" [COLORS]="COLORS"
  [formValid]="formValid" [amountAfterDown]="amountAfterDown" (closeForm)="closeForm()" (submit)="submit()"
  (updateParentTotals)="updateTotalsFromLoans()" (onInstallmentsCountChange)="onInstallmentsCountChange()"
  (addLoanComponent)="addLoanComponent()" (removeLoanComponent)="removeLoanComponent($event)"
  (calculateLoanPMT)="calculateLoanPMT($event)" (calculatePayoffAmount)="calculatePayoffAmount($event)"
  (onMonthlyPaymentChange)="onMonthlyPaymentChange()" (addMilestone)="addMilestone()"
  (removeMilestone)="removeMilestone($event)" (onMilestonePctChange)="onMilestonePctChange($event)"
  (onMilestoneAmountChange)="onMilestoneAmountChange($event)">
</app-installment-form>

<!-- ════ CONFIRMATION DIALOGS ════ -->
<app-installment-confirm-dialogs [pendingDeleteId]="pendingDeleteId" [pendingUndoAction]="pendingUndoAction"
  [pendingWarnings]="pendingWarnings" [showMarkAsPaidDialog]="showMarkAsPaidDialog"
  [paymentDateInput]="paymentDateInput" (doDelete)="doDelete()" (cancelDelete)="cancelDelete()"
  (doUndoPayment)="doUndoPayment()" (cancelUndoPayment)="cancelUndoPayment()"
  (confirmWarnings)="confirmWarnings()" (cancelWarnings)="cancelWarnings()"
  (cancelMarkAsPaidDialog)="cancelMarkAsPaidDialog()" (confirmMarkAsPaid)="confirmMarkAsPaid()"
  (paymentDateInputChange)="paymentDateInput = $event">
</app-installment-confirm-dialogs>
