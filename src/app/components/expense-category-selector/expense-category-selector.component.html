<div dir="rtl">
  <button
    type="button"
    class="category-card toggle-card"
    [style.--category-color]="selectedConfig.color"
    (click)="toggleExpanded()"
    [attr.aria-expanded]="isExpanded()"
    [attr.aria-label]="selectedConfig.label"
  >
    <span class="color-indicator" aria-hidden="true"></span>
    <mat-icon aria-hidden="true">{{ selectedConfig.icon }}</mat-icon>
    <span class="label">{{ selectedConfig.label }}</span>
    <mat-icon class="chevron" aria-hidden="true">{{ isExpanded() ? 'expand_less' : 'expand_more' }}</mat-icon>
  </button>

  @if (isExpanded()) {
    <div class="category-selector" role="radiogroup" aria-label="קטגוריית הוצאה">
      @for (config of categories; track config.id) {
        <button
          type="button"
          class="category-card"
          [class.selected]="selectedCategory() === config.id"
          [style.--category-color]="config.color"
          [attr.aria-checked]="selectedCategory() === config.id"
          [attr.aria-label]="config.label"
          role="radio"
          (click)="select(config.id); toggleExpanded()"
        >
          <span class="color-indicator" aria-hidden="true"></span>
          <mat-icon aria-hidden="true">{{ config.icon }}</mat-icon>
          <span class="label">{{ config.label }}</span>
        </button>
      }
    </div>
  }
</div>
